## How Spring Connects These Two Files
# ```
# App starts
#     ↓
# Spring reads application.properties
#     ↓
# Sees spring.profiles.active=local
#     ↓
# Automatically loads application-local.properties
#     ↓
# Spring sees ${DB_URL} in application.properties
#     ↓
# Looks in application-local.properties → finds DB_URL=jdbc:postgresql://...
#     ↓
# Replaces ${DB_URL} with the actual value ✅
#     ↓
# App connects to database successfully